<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseForge</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2.5rem, 2rem + 2.5vw, 4rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec;
      --color-border: #d4d1ca; --color-divider: #dcd9d5; --color-text: #28251d; --color-text-muted: #66655f; --color-text-faint: #94928c;
      --color-text-inverse: #f9f8f4; --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #d7e9e8;
      --color-success: #437a22; --color-warning: #964219;
      --shadow-sm: 0 1px 2px rgba(40, 37, 29, 0.06); --shadow-md: 0 8px 24px rgba(40, 37, 29, 0.08);
      --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1rem; --radius-xl: 1.25rem;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #252320;
      --color-border: #393836; --color-divider: #2b2a28; --color-text: #ece9e2; --color-text-muted: #b5b1a8;
      --color-text-faint: #87837c; --color-text-inverse: #171614; --color-primary: #4f98a3;
      --color-primary-hover: #6ab4bf; --color-primary-highlight: rgba(79,152,163,0.18);
      --color-success: #7fbb5a; --color-warning: #d08a63;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.25); --shadow-md: 0 10px 30px rgba(0,0,0,0.32);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.55;
      background: radial-gradient(circle at top right, var(--color-primary-highlight), transparent 28%), var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
    }
    h1, h2, h3, p { margin: 0; }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-8);
      border-bottom: 1px solid var(--color-divider);
      background: color-mix(in srgb, var(--color-surface) 88%, white 12%);
    }
    .logo-wrap { display: flex; align-items: center; gap: var(--space-3); text-decoration: none; color: inherit; }
    .logo {
      width: 40px; height: 40px; border-radius: 12px;
      display: grid; place-items: center;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
    }
    .brand-name { font-size: var(--text-lg); font-weight: 900; letter-spacing: -0.03em; }
    .theme-toggle {
      min-width: 44px; min-height: 44px; border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--color-text) 14%, transparent);
      background: var(--color-surface-2); color: var(--color-text);
      display: grid; place-items: center; cursor: pointer;
      transition: transform var(--transition-interactive), background var(--transition-interactive);
    }
    .theme-toggle:hover { transform: translateY(-1px); }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-16) var(--space-6);
      gap: var(--space-6);
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: 6px 14px; border-radius: 999px;
      background: var(--color-primary-highlight); color: var(--color-primary);
      font-size: var(--text-xs); font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }
    .hero-title {
      font-size: var(--text-2xl);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.1;
      max-width: 640px;
    }
    .hero-title span { color: var(--color-primary); }
    .hero-sub {
      color: var(--color-text-muted);
      font-size: var(--text-lg);
      max-width: 480px;
      line-height: 1.5;
    }
    .btn {
      min-height: 52px; border-radius: 999px; padding: 0 var(--space-8);
      border: 0; display: inline-flex; align-items: center; justify-content: center;
      gap: var(--space-2); cursor: pointer; font-family: inherit; font-size: var(--text-base);
      transition: transform var(--transition-interactive), background var(--transition-interactive);
      text-decoration: none;
    }
    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); font-weight: 700; }
    .btn-primary:hover { background: var(--color-primary-hover); transform: translateY(-2px); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: var(--space-6);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      border-top: 1px solid var(--color-divider);
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo-wrap" href="/">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 30 18 18l6 10 6-16 8 18" />
          <path d="M9 36h30" />
        </svg>
      </div>
      <span class="brand-name">PulseForge</span>
    </a>
    <button class="theme-toggle" type="button" id="themeToggle" aria-label="Basculer le thème">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </nav>

  <main class="hero">
    <div class="hero-eyebrow">
      <svg width="12" height="12" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 30 18 18l6 10 6-16 8 18"/>
      </svg>
      Bienvenue
    </div>
    <h1 class="hero-title">Forge ton <span>potentiel</span>,<br>dépasse tes limites.</h1>
    <p class="hero-sub">Des programmes d'entraînement sur mesure pour atteindre tes objectifs, à ton rythme.</p>
    <a href="/sport.html" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 12h8M14 8l4 4-4 4"/>
      </svg>
      Accéder aux sports
    </a>
  </main>

  <footer>© 2026 PulseForge — Tous droits réservés.</footer>

  <script>
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) html.setAttribute('data-theme', saved);
    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
